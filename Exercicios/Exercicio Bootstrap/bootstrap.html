<html>

<head>

<body>

            </div>
        </div>
        <div class="row">
            <div class="col"></div>
            <div class="col-10 col-4 bg-danger">

            <div class="col"></div>
        </div>
    </section>
    <br>
    <!-- Exercicio -->
    <section>
        <div class="container text-center">
            <div class="row">

                    One Third

                </div>

            </div>
            <div class="row">
